backend:
  name: git-gateway
  branch: master # Branch to update (optional; defaults to master)
media_folder: public/img
public_folder: img
collections:
  - name: "pages"
    label: "Pages"
    files:
    - label: "global"
      name: "global"
      file: "content/global.md"
      fields:
        - label: 'Title'
          name: 'title'
          widget: 'string'
        - label: 'Image'
          name: 'image'
          widget: 'image'
        - label: "Social"
          name: "social"
          widget: "list"
          collapsed: true
          fields: 
            - label: "Name"
              name: "name"
              widget: "string"
            - label: "Link"
              name: "link"
              widget: "string"