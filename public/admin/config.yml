backend:
  name: git-gateway
  branch: master # Branch to update (optional; defaults to master)
media_folder: public/img
public_folder: img
collections:
  - name: "pages"
    label: "Pages"
    files:
    - label: "global"
      name: "global"
      file: "content/global.md"
      fields:
        - label: 'Title'
          name: 'title'
          widget: 'string'
        - label: 'Image'
          name: 'image'
          widget: 'image'
        - label: "Social"
          name: "social"
          widget: "list"
          collapsed: true
          fields: 
            - label: "Name"
              name: "name"
              widget: "string"
            - label: "Link"
              name: "link"
              widget: "string"
  - label: "Blog"
    name: "blog"
    folder: "content/blog"
    create: true
    fields: 
      - label: "Title"
        name: "title"
        widget: "string"
        required: true
      - label: "Card Image"
        name: "cardImage"
        widget: "image"
      - label: "Featured Image"
        name: "featuredImage"
        widget: "image"
      - label: "Description"
        name: "description"
        widget: "text"
        required: true
      - label: "Created at"
        name: "createdAt"
        widget: "date"
      - label: "Read time"
        name: "readTime"
        widget: "number"
        value_type: "int"
          